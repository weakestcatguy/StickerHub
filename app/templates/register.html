{% extends "base.html" %}

{% block title %}Register - StickerHub{% endblock %}

{% block content %}
  <section class="form-panel" style="margin-inline: auto;">
    <h2>Create Account</h2>
    <form method="post">
      <label>
        Username
        <input id="username" name="username" autocomplete="username" required>
      </label>

      <label>
        Email
        <input id="email" name="email" type="email" autocomplete="email" required>
      </label>

      <label>
        Password
        <input id="password" name="password" type="password" autocomplete="new-password" minlength="8" required>
      </label>

      <button type="submit" class="button button-teal full-width">
        Create Account
      </button>
    </form>
    <p style="margin-top: 16px; text-align: center; font-weight: 800; text-transform: uppercase; font-size: 14px;">
      Already have an account?
      <a href="{{ url_for('web.login') }}" style="color: var(--teal);">Log in</a>.
    </p>
  </section>
{% endblock %}
