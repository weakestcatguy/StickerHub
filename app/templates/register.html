{% extends "base.html" %}

{% block title %}Register - StickerHub{% endblock %}

{% block content %}
  <div class="max-w-md mx-auto mt-10 bg-white p-8 rounded-lg shadow-md">
    <h1 class="text-2xl font-bold mb-6 text-center text-gray-900">Create Account</h1>
    <form method="post" class="space-y-4">
      <div>
        <label class="block text-gray-700 font-medium mb-1" for="username">Username</label>
        <input id="username" name="username" autocomplete="username" required
               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-400 focus:border-transparent">
      </div>
      <div>
        <label class="block text-gray-700 font-medium mb-1" for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required
               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-400 focus:border-transparent">
      </div>
      <div>
        <label class="block text-gray-700 font-medium mb-1" for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="new-password" minlength="8" required
               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-400 focus:border-transparent">
      </div>
      <button type="submit"
              class="w-full bg-teal-500 text-white py-2 rounded-lg hover:bg-teal-600 transition font-medium">
        Create Account
      </button>
    </form>
    <p class="mt-4 text-center text-gray-600 text-sm">
      Already have an account?
      <a href="{{ url_for('web.login') }}" class="text-teal-600 hover:underline font-medium">Log in</a>.
    </p>
  </div>
{% endblock %}
