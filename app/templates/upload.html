{% extends "base.html" %}

{% block title %}Upload Sticker - StickerHub{% endblock %}

{% block content %}
  <section class="form-panel" style="margin-inline: auto;">
    <h2>Upload a Sticker</h2>
    <p style="font-weight: 800; margin-bottom: 24px; text-transform: uppercase; font-size: 14px;">
      PNG or WebP (max 5 MB) &middot; Animated GIF (max 15 MB)
    </p>

    <form action="{{ url_for('web.upload') }}" method="post" enctype="multipart/form-data" id="upload-form">
      <label>
        Sticker File
        <input id="file" name="file" type="file" accept=".png,.webp,.gif" required
               style="border: 3px solid var(--ink); padding: 8px;">
        <p id="file-error" class="text-red-600 text-sm mt-1 hidden" style="color: var(--pink); font-weight: 800;"></p>
        <!-- Animated preview -->
        <div id="preview-wrap" class="hidden mt-3" style="margin-top: 12px;">
          <p class="text-xs text-gray-400 mb-1" style="font-size: 12px; text-transform: uppercase;">Preview</p>
          <img id="preview-img" src="" alt="preview"
               class="max-h-48 rounded-lg border border-gray-200 object-contain"
               style="max-height: 192px; border: 2px solid var(--ink); background: var(--paper); padding: 8px;">
          <span id="gif-badge" class="hidden ml-2 inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-purple-100 text-purple-700"
                style="background: #7c3aed; color: white; padding: 4px 8px; font-weight: 900; text-transform: uppercase; font-size: 11px;">Animated GIF</span>
        </div>
      </label>

      <label>
        Title
        <input id="title" name="title" placeholder="BIG MOOD">
      </label>

      <label>
        Tags
        <input id="tags" name="tags" placeholder="reaction, funny, whatsapp">
      </label>

      <button type="submit" class="button button-teal full-width">
        Publish Sticker
      </button>
    </form>
  </section>

  <script>
    var fileInput  = document.getElementById('file');
    var errorEl    = document.getElementById('file-error');
    var previewWrap = document.getElementById('preview-wrap');
    var previewImg  = document.getElementById('preview-img');
    var gifBadge    = document.getElementById('gif-badge');

    fileInput.addEventListener('change', function () {
      errorEl.classList.add('hidden');
      previewWrap.classList.add('hidden');
      gifBadge.classList.add('hidden');

      var file = fileInput.files[0];
      if (!file) return;

      var isGif = file.type === 'image/gif';
      var limit = isGif ? 15 * 1024 * 1024 : 5 * 1024 * 1024;

      if (file.size > limit) {
        errorEl.textContent = isGif
          ? 'GIF must be 15 MB or smaller.'
          : 'PNG/WebP must be 5 MB or smaller.';
        errorEl.classList.remove('hidden');
        return;
      }

      // Show animated preview (works for GIF, PNG, and WebP).
      var url = URL.createObjectURL(file);
      previewImg.src = url;
      previewWrap.classList.remove('hidden');
      if (isGif) gifBadge.classList.remove('hidden');
    });

    document.getElementById('upload-form').addEventListener('submit', function (e) {
      var file = fileInput.files[0];
      if (!file) return;
      var isGif = file.type === 'image/gif';
      var limit = isGif ? 15 * 1024 * 1024 : 5 * 1024 * 1024;
      if (file.size > limit) {
        e.preventDefault();
        errorEl.textContent = isGif
          ? 'GIF must be 15 MB or smaller.'
          : 'PNG/WebP must be 5 MB or smaller.';
        errorEl.classList.remove('hidden');
      }
    });
  </script>
{% endblock %}
