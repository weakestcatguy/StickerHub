{% extends "base.html" %}

{% block title %}Log In - StickerHub{% endblock %}

{% block content %}
  <section class="form-panel" style="margin-inline: auto;">
    <h2>Log In</h2>
    <form method="post">
      <label>
        Email or Username
        <input id="identifier" name="identifier" autocomplete="username" required>
      </label>

      <label>
        Password
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </label>

      <button type="submit" class="button button-teal full-width">
        Log In
      </button>
    </form>
    <p style="margin-top: 16px; text-align: center; font-weight: 800; text-transform: uppercase; font-size: 14px;">
      Need an account?
      <a href="{{ url_for('web.register') }}" style="color: var(--teal);">Join StickerHub</a>.
    </p>
  </section>
{% endblock %}
