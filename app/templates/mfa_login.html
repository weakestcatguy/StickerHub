{% extends "base.html" %}

{% block title %}Verify Login - StickerHub{% endblock %}

{% block content %}
  <section class="form-panel" style="margin-inline: auto;">
    <h2>Two-Factor Authentication</h2>
    <p style="font-weight: 800; margin-bottom: 16px; text-transform: uppercase; font-size: 14px;">
      Enter the 6-digit code from your authenticator app.
    </p>
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label>
        Authenticator Code
        <input id="code" name="code" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" autocomplete="one-time-code" required>
      </label>
      <button type="submit" class="button button-teal full-width">Verify</button>
    </form>
  </section>
{% endblock %}
